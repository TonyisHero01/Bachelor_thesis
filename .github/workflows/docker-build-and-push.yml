name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bms
            dockerfile: ./eshop_bms/Dockerfile
            image: eshop-bms
          - service: frontweb
            dockerfile: ./eshop_frontweb/Dockerfile
            image: eshop-frontweb
          - service: search-service
            dockerfile: ./search_service/Dockerfile
            image: eshop-search-service
          - service: benchmark
            dockerfile: ./benchmark/Dockerfile
            image: eshop-benchmark

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed services
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bms:
              - 'eshop_bms/**'
            frontweb:
              - 'eshop_frontweb/**'
            search-service:
              - 'search_service/**'
            benchmark:
              - 'benchmark/**'
            workflow:
              - '.github/workflows/**'
      - name: Download ESCI dataset for benchmark image
        if: |
          matrix.service == 'benchmark' &&
          (
            steps.changes.outputs.benchmark == 'true' ||
            steps.changes.outputs.workflow == 'true' ||
            github.event_name == 'workflow_dispatch' ||
            github.ref_type == 'tag'
          )
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs

          rm -rf benchmark/esci-data

          GIT_LFS_SKIP_SMUDGE=1 git clone https://github.com/amazon-science/esci-data.git benchmark/esci-data

          cd benchmark/esci-data
          git lfs install --local
          git lfs pull --include="shopping_queries_dataset/*.parquet" --exclude=""
          cd ../..

          ls -lh benchmark/esci-data/shopping_queries_dataset
          du -sh benchmark/esci-data
          
      - name: Login to GitHub Container Registry
        if: |
          steps.changes.outputs[matrix.service] == 'true' ||
          steps.changes.outputs.workflow == 'true' ||
          github.event_name == 'workflow_dispatch' ||
          github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: |
          steps.changes.outputs[matrix.service] == 'true' ||
          steps.changes.outputs.workflow == 'true' ||
          github.event_name == 'workflow_dispatch' ||
          github.ref_type == 'tag'
        uses: docker/setup-buildx-action@v3

      - name: Normalize image namespace
        if: |
          steps.changes.outputs[matrix.service] == 'true' ||
          steps.changes.outputs.workflow == 'true' ||
          github.event_name == 'workflow_dispatch' ||
          github.ref_type == 'tag'
        id: namespace
        shell: bash
        run: |
          echo "value=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Generate image tags
        if: |
          steps.changes.outputs[matrix.service] == 'true' ||
          steps.changes.outputs.workflow == 'true' ||
          github.event_name == 'workflow_dispatch' ||
          github.ref_type == 'tag'
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "version_tag=main" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "version_tag=develop" >> $GITHUB_OUTPUT
            echo "latest_tag=dev-latest" >> $GITHUB_OUTPUT
          else
            echo "version_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "latest_tag=dev-latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        if: |
          steps.changes.outputs[matrix.service] == 'true' ||
          steps.changes.outputs.workflow == 'true' ||
          github.event_name == 'workflow_dispatch' ||
          github.ref_type == 'tag'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.namespace.outputs.value }}/${{ matrix.image }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.namespace.outputs.value }}/${{ matrix.image }}:${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}