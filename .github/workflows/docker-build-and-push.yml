name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bms
            dockerfile: ./eshop_bms/Dockerfile
            image: eshop-bms
          - service: frontweb
            dockerfile: ./eshop_frontweb/Dockerfile
            image: eshop-frontweb
          - service: search-service
            dockerfile: ./search_service/Dockerfile
            image: eshop-search-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image namespace
        id: namespace
        shell: bash
        run: |
          echo "value=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Generate image tags
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "version_tag=main" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "version_tag=develop" >> $GITHUB_OUTPUT
            echo "latest_tag=dev-latest" >> $GITHUB_OUTPUT
          else
            echo "version_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "latest_tag=dev-latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.namespace.outputs.value }}/${{ matrix.image }}:${{ steps.meta.outputs.version_tag }}
            ${{ steps.namespace.outputs.value }}/${{ matrix.image }}:${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max