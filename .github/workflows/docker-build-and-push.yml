name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/TonyisHero01

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bms
            dockerfile: ./docker/bms/Dockerfile
            image: eshop-bms
          - service: frontweb
            dockerfile: ./docker/frontweb/Dockerfile
            image: eshop-frontweb
          - service: python-api
            dockerfile: ./docker/api/Dockerfile
            image: eshop-python-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "version_tag=main" >> $GITHUB_OUTPUT
            echo "latest_tag=test-latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "version_tag=develop" >> $GITHUB_OUTPUT
            echo "latest_tag=test-latest" >> $GITHUB_OUTPUT
          else
            echo "version_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "latest_tag=test-latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.version_tag }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.meta.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max