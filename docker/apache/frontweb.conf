<VirtualHost *:80>
    ServerName frontweb.localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/frontweb-error.log
    CustomLog ${APACHE_LOG_DIR}/frontweb-access.log combined
</VirtualHost>