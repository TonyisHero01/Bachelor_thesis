controllers:
  resource: ../src/Controller/
  type: attribute

api_controllers:
  resource: ../src/Api/Controller/
  type: attribute

product_edit:
  path: '/bms/product_edit/{id}'
  controller: App\Controller\ProductController::edit

save_product:
  path: '/bms/product_save/{id}'
  controller: App\Controller\ProductController::saveProduct

save_image:
  path: '/image_save/{id}'
  controller: App\Controller\ProductController::saveImage

register_succesfull:
  path: /register_succesfull
  controller: App\Controller\RegistrationController::registerSuccessfullNotificate

home:
  path: /home
  controller: App\Controller\HomeController::home

images:
  path: /images/*
  controller: null

set_currency:
  path: /set-currency
  controller: App\Controller\CurrencyController::setCurrency
  methods: [POST]