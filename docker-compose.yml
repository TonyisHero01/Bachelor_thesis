x-app-env: &app-env
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_SECRET: ${APP_SECRET}
  DATABASE_URL: ${DATABASE_URL}
  PYTHON_API_BASE_URL: ${PYTHON_API_BASE_URL}
  MAILER_DSN: ${MAILER_DSN}
  MAX_ARTICLES_COUNT_PER_PAGE: ${MAX_ARTICLES_COUNT_PER_PAGE}
  NAME_MAX_LENGTH: ${NAME_MAX_LENGTH}
  CONTENT_MAX_LENGTH: ${CONTENT_MAX_LENGTH}
  CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
  BMS_URL: ${BMS_URL}
  LOCK_DSN: ${LOCK_DSN}

services:
  db:
    image: postgres:14
    container_name: eshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  bms:
    image: ${GHCR_NAMESPACE}/eshop-bms:${IMAGE_TAG}
    container_name: eshop_bms
    restart: unless-stopped
    environment:
      <<: *app-env
      SYMFONY_DEPRECATIONS_HELPER: disabled
    ports:
      - "8083:80"
    volumes:
      - ./eshop_frontweb/templates:/var/www/eshop_frontweb_templates
      - ./docker/apache/bms.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      db:
        condition: service_healthy
      python-api:
        condition: service_started
    networks:
      - backend

  python-api:
    image: ${GHCR_NAMESPACE}/eshop-python-api:${IMAGE_TAG}
    container_name: eshop_python_api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PYTHONDONTWRITEBYTECODE: ${PYTHONDONTWRITEBYTECODE}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8000"
    networks:
      - backend

  frontweb:
    image: ${GHCR_NAMESPACE}/eshop-frontweb:${IMAGE_TAG}
    container_name: eshop_frontweb
    restart: unless-stopped
    environment:
      <<: *app-env
      SYMFONY_DEPRECATIONS_HELPER: disabled
    ports:
      - "8082:80"
    volumes:
      - ./docker/apache/frontweb.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      db:
        condition: service_healthy
      python-api:
        condition: service_started
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata: