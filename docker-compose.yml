services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  bms:
    build:
      context: .
      dockerfile: docker/bms/Dockerfile
    ports:
      - "8083:80"
    volumes:
      - ./eshop_bms:/var/www/html
      - ./eshop_frontweb/templates:/var/www/eshop_frontweb_templates
      - ./docker/apache/bms.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

  frontweb:
    build:
      context: .
      dockerfile: docker/frontweb/Dockerfile
    ports:
      - "8082:80"
    volumes:
      - ./eshop_frontweb:/var/www/html
      - ./docker/apache/frontweb.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata:
