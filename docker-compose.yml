version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend

  php-frontweb:
    build:
      context: ./docker/php-frontweb
    volumes:
      - ./frontweb:/var/www/html
    networks:
      - backend

  php-bms:
    build:
      context: ./docker/php-bms
    volumes:
      - ./bms:/var/www/html
    networks:
      - backend

  apache-frontweb:
    image: php:8.2-apache
    ports:
      - "8082:80"
    volumes:
      - ./frontweb:/var/www/html
      - ./docker/apache/frontweb.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      - php-frontweb
    networks:
      - backend
    command: bash -c "a2enmod rewrite && apache2-foreground"

  apache-bms:
    image: php:8.2-apache
    ports:
      - "8083:80"
    volumes:
      - ./bms:/var/www/html
      - ./docker/apache/bms.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      - php-bms
    networks:
      - backend
    command: bash -c "a2enmod rewrite && apache2-foreground"

volumes:
  db-data:

networks:
  backend: