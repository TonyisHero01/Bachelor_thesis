x-app-env: &app-env
  APP_ENV: ${APP_ENV}
  APP_DEBUG: ${APP_DEBUG}
  APP_SECRET: ${APP_SECRET}
  DATABASE_URL: ${DATABASE_URL}
  SEARCH_SERVICE_BASE_URL: ${SEARCH_SERVICE_BASE_URL}
  SEARCH_API_KEY: ${SEARCH_API_KEY}
  MAILER_DSN: ${MAILER_DSN}
  MAX_ARTICLES_COUNT_PER_PAGE: ${MAX_ARTICLES_COUNT_PER_PAGE}
  NAME_MAX_LENGTH: ${NAME_MAX_LENGTH}
  CONTENT_MAX_LENGTH: ${CONTENT_MAX_LENGTH}
  CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
  BMS_URL: ${BMS_URL}
  LOCK_DSN: ${LOCK_DSN}
  PHP_UPLOAD_MAX_FILESIZE: ${PHP_UPLOAD_MAX_FILESIZE}
  PHP_POST_MAX_SIZE: ${PHP_POST_MAX_SIZE}
  PHP_MAX_FILE_UPLOADS: ${PHP_MAX_FILE_UPLOADS}

services:
  db:
    image: pgvector/pgvector:pg14
    container_name: eshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  bms:
    image: ${GHCR_NAMESPACE}/eshop-bms:${IMAGE_TAG}
    container_name: eshop_bms
    restart: unless-stopped
    environment:
      <<: *app-env
      SYMFONY_DEPRECATIONS_HELPER: disabled
    ports:
      - "8083:80"
    volumes:
      - ./eshop_frontweb/templates:/var/www/eshop_frontweb_templates
    depends_on:
      db:
        condition: service_healthy
      search-service:
        condition: service_started
    networks:
      - backend

  search-service:
    image: ${GHCR_NAMESPACE}/eshop-search-service:${IMAGE_TAG}
    container_name: eshop_search_service
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SEARCH_API_KEY: ${SEARCH_API_KEY}
      MAX_SEARCH_LIMIT: ${MAX_SEARCH_LIMIT:-200}
      DEFAULT_SEARCH_LIMIT: ${DEFAULT_SEARCH_LIMIT:-50}
      PYTHONDONTWRITEBYTECODE: ${PYTHONDONTWRITEBYTECODE:-1}
      PYTHONUNBUFFERED: ${PYTHONUNBUFFERED:-1}
      MODEL_NAME: ${MODEL_NAME}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8000"
    networks:
      - backend

  frontweb:
    image: ${GHCR_NAMESPACE}/eshop-frontweb:${IMAGE_TAG}
    container_name: eshop_frontweb
    restart: unless-stopped
    environment:
      <<: *app-env
      SYMFONY_DEPRECATIONS_HELPER: disabled
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy
      search-service:
        condition: service_started
    networks:
      - backend
  benchmark:
    image: ${GHCR_NAMESPACE}/eshop-benchmark:${IMAGE_TAG}
    container_name: eshop_benchmark
    restart: unless-stopped
    depends_on:
      - search-service
      - bms
    environment:
      DATABASE_URL: ${DATABASE_URL}

      SEARCH_API_KEY: ${SEARCH_API_KEY}

      SEARCH_URL: http://search-service:8000
      BMS_URL: http://bms

      BENCHMARK_REPEAT_COUNT: ${BENCHMARK_REPEAT_COUNT:-5}

    ports:
      - "8084:8000"

    networks:
      - backend

networks:
  backend:

volumes:
  pgdata: