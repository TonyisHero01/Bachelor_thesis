version: "3.9"

x-app-env: &app-env
  APP_ENV: dev
  APP_DEBUG: "1"
  APP_SECRET: 75d2222c239930c8fc40c98ae6b88cb6d9dfacf51c5c8c0749583fc681de9d9a
  DATABASE_URL: "postgresql://user:password@db:5432/app"
  PYTHON_API_BASE_URL: "http://python-api:8000"
  MAILER_DSN: "smtp://wang.tony.0330@gmail.com:lfjxrpczzshywbdx@smtp.gmail.com:587?encryption=tls"
  MAX_ARTICLES_COUNT_PER_PAGE: "10"
  NAME_MAX_LENGTH: "32"
  CONTENT_MAX_LENGTH: "1024"
  CORS_ALLOW_ORIGIN: "^https?://(localhost|127\\.0\\.0\\.1)(:[0-9]+)?$"
  BMS_URL: "http://localhost:8083/"
  LOCK_DSN: "flock"

services:
  db:
    image: postgres:14
    container_name: eshop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d app"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  python-api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: eshop_python_api
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/app"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:8000"
    networks:
      - backend

  bms:
    build:
      context: .
      dockerfile: docker/bms/Dockerfile
    container_name: eshop_bms
    restart: unless-stopped
    environment:
      <<: *app-env
      SYMFONY_DEPRECATIONS_HELPER: disabled
    ports:
      - "8083:80"
    volumes:
      - ./eshop_bms:/var/www/html
      - ./eshop_frontweb/templates:/var/www/eshop_frontweb_templates
      - ./docker/apache/bms.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      db:
        condition: service_healthy
      python-api:
        condition: service_started
    networks:
      - backend

  frontweb:
    build:
      context: .
      dockerfile: docker/frontweb/Dockerfile
    container_name: eshop_frontweb
    restart: unless-stopped
    environment:
      <<: *app-env
      SYMFONY_DEPRECATIONS_HELPER: disabled
    ports:
      - "8082:80"
    volumes:
      - ./eshop_frontweb:/var/www/html
      - ./docker/apache/frontweb.conf:/etc/apache2/sites-enabled/000-default.conf
    depends_on:
      db:
        condition: service_healthy
      python-api:
        condition: service_started
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata:
