security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        customer_user_provider:
            entity:
                class: App\Entity\Customer
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        customer:
            lazy: true
            provider: customer_user_provider
            entry_point: form_login
            custom_authenticators:
                - App\Security\CustomerLoginFormAuthenticator
            form_login:
                login_path: customer_login
                check_path: customer_login
                # 移除 default_target_path 以便 Symfony 自动处理返回路径
                always_use_default_target_path: false
                username_parameter: email
                password_parameter: password
            logout:
                path: app_logout
                target: customer_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 一周的有效时间
                path: /

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10